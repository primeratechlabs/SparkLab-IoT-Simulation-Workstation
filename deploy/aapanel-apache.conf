# ─────────────────────────────────────────────────────────────────────────────
# SparkLab on aaPanel — Apache (not Nginx)
#
# Apache, UNLIKE nginx, applies `Header always set` to ALL responses (no per-location
# repetition, no regex-shadow problem). The app needs cross-origin isolation
# (COOP+COEP+CORP) over HTTPS, or the browser drops crossOriginIsolated and the whole
# in-browser compiler + emulator break.
#
# HOW TO APPLY (aaPanel-blessed, survives vhost regeneration):
#   Put this file at:
#     /www/server/panel/vhost/apache/extension/<your-domain>/sparklab-coi.conf
#   The site's :443 VirtualHost already has:
#     IncludeOptional /www/server/panel/vhost/apache/extension/<your-domain>/*.conf
#   so it is auto-included. Then: apachectl configtest && apachectl -k graceful
#   (or aaPanel -> Website -> site -> reload). Requires mod_headers + mod_rewrite
#   (enabled by default on aaPanel Apache) and SSL + Force HTTPS.
#
# Keep these CSP/COOP/COEP values in sync with packages/app/headers.config.mjs.
# ─────────────────────────────────────────────────────────────────────────────

<IfModule mod_headers.c>
    # Cross-origin isolation (REQUIRED) — applies to every response, incl. /assets + /toolchain.
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Embedder-Policy "require-corp"
    Header always set Cross-Origin-Resource-Policy "same-origin"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"

    # Caching: hashed assets immutable; the two client toolchains long-cache; their JSON manifests
    # revalidate. (Later LocationMatch wins for an overlapping path, so manifests end up no-cache.)
    <LocationMatch "^/assets/">
        Header always set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>
    <LocationMatch "^/(toolchain|esp32-classic-toolchain)/">
        Header always set Cache-Control "public, max-age=604800"
    </LocationMatch>
    <LocationMatch "/(manifest\.json|esp32-classic-sdk\.json)$">
        Header always set Cache-Control "no-cache"
    </LocationMatch>
    # PWA: the service worker + web manifest must revalidate so a new deploy's SW is picked up.
    <LocationMatch "^/(sw\.js|manifest\.webmanifest)$">
        Header always set Cache-Control "no-cache"
    </LocationMatch>
</IfModule>

# .webmanifest MIME (Apache mime.types may lack it).
<IfModule mod_mime.c>
    AddType application/manifest+json .webmanifest
</IfModule>

# SPA deep-link fallback. SparkLab routes are query params (/?view=labs) so this is mostly a safety net.
# CRITICAL: at vhost level (not .htaccess) %{REQUEST_FILENAME} is NOT yet mapped to a path, so its -f/-d
# tests always fail and would mask EVERY real file (favicon, /licenses, /THIRD-PARTY-NOTICES) with
# index.html. Test the real on-disk path with %{DOCUMENT_ROOT}%{REQUEST_URI} instead. The asset/toolchain
# guard keeps a missing toolchain a 404 (never index.html).
<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-f
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-d
    RewriteCond %{REQUEST_URI} !^/(assets|toolchain|esp32-classic-toolchain)/
    RewriteRule ^ /index.html [L]
</IfModule>

# gzip is already enabled by aaPanel (SetOutputFilter DEFLATE on the site Directory); if not, add:
# <IfModule mod_deflate.c>
#   AddOutputFilterByType DEFLATE text/html text/css application/javascript text/javascript application/json application/wasm image/svg+xml
# </IfModule>
