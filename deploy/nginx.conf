# nginx production config for the Sparklab SPA (serves packages/app/dist).
# The security headers are repeated (via include) in EVERY location — see security-headers.conf for
# why. Correct MIME for ES modules / WASM / fonts; immutable cache for hashed assets; long cache for
# the toolchain (manifest stays revalidated); SPA fallback that never masks a missing toolchain file.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ES modules + WASM + fonts must carry the right Content-Type (older nginx mime.types miss .mjs).
  types {
    text/html                             html;
    text/javascript                       js mjs;
    text/css                              css;
    application/json                      json map;
    application/wasm                      wasm;
    image/svg+xml                         svg;
    font/woff2                            woff2;
    image/png                             png;
    image/x-icon                          ico;
    text/plain                            txt hex;
    application/manifest+json             webmanifest;
  }
  default_type application/octet-stream;
  gzip on;
  gzip_types text/javascript application/json application/wasm text/css image/svg+xml application/manifest+json;

  location / {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /index.html;
  }

  # PWA service worker + manifest must revalidate so a new deploy's SW is picked up (never long-cached).
  location = /sw.js {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache" always;
  }
  location = /manifest.webmanifest {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache" always;
  }

  location ^~ /assets/ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ^~ /toolchain/ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=604800" always;
    location = /toolchain/manifest.json {
      include /etc/nginx/security-headers.conf;
      add_header Cache-Control "no-cache" always;
    }
  }

  # ESP32 classic (Xtensa) client toolchain — the selectable WiFi board fetches this (~100MB). Same
  # isolation headers + long cache as /toolchain/; without it, a missing file falls back to index.html.
  location ^~ /esp32-classic-toolchain/ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=604800" always;
    location = /esp32-classic-toolchain/esp32-classic-sdk.json {
      include /etc/nginx/security-headers.conf;
      add_header Cache-Control "no-cache" always;
    }
  }
}
