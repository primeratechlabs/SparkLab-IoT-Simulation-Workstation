# Production security headers for nginx — INCLUDED in every location block (nginx `add_header` does
# NOT inherit once a location sets its own add_header, so omitting this in /assets/ or /toolchain/
# would silently de-isolate exactly the hashed assets + the toolchain). Single source of these values
# is packages/app/headers.config.mjs (guarded by deploy-headers.test.ts).
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
