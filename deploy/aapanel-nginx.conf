# ─────────────────────────────────────────────────────────────────────────────
# Sparklab on aaPanel 8.x (Ubuntu, Nginx)
#
# aaPanel does NOT set cross-origin isolation headers for a site, so without this the browser
# silently drops crossOriginIsolated → SharedArrayBuffer / threaded WASM / OPFS all break and every
# in-browser compile + emulation fails. HTTPS is also required (COEP needs a secure context — use
# aaPanel → site → SSL → Let's Encrypt, and force HTTPS).
#
# HOW TO USE
#   aaPanel → Website → <your site> → Config (配置文件 / "Configuration File").
#   In the generated `server { ... }` block:
#     1) DELETE the default `location / { ... }` and paste the FOUR location blocks below in its place.
#     2) Paste the `gzip ...` lines (top of this file) once at the server{} level (NOT inside a location).
#     3) If aaPanel added an anti-leech / static-resource block like
#          location ~ .*\.(gif|jpg|jpeg|png|js|css|woff2|...)$ { ... }
#        DELETE it (or add the three COOP/COEP/CORP add_header lines to it). A regex `location ~` block
#        takes precedence over a plain prefix and would serve fonts/favicon WITHOUT CORP → COEP blocks
#        them. The `^~` on /assets/ and /toolchain/ below already wins over such a regex for THOSE
#        paths, but a root-level file (/favicon.png) would still be intercepted by a leftover regex.
#   Save → aaPanel reloads nginx (or: nginx -t && nginx -s reload).
#   Site root (where you upload dist/): /www/wwwroot/<your-domain>
#
# The headers are repeated in every location on purpose: nginx `add_header` does NOT inherit once a
# location declares its own add_header, so omitting them in /assets/ or /toolchain/ would de-isolate
# exactly the hashed assets + the toolchain while the index page looks fine.
# Keep these CSP/COOP/COEP values in sync with packages/app/headers.config.mjs (deploy-headers.test.ts guards it).
# ─────────────────────────────────────────────────────────────────────────────

# ── Paste these gzip lines at the server{} level (once). The toolchain is mostly compressible text
#    (clang.mjs ~55MB → ~20MB, cc1plus.mjs ~27MB → ~9MB gzipped) so this roughly thirds the first-compile
#    download. (Or just toggle aaPanel → site → Config → "Gzip".) Pre-gzip caching is fine; .wasm too.
gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types text/plain text/css text/javascript application/javascript application/json application/wasm image/svg+xml;

# ── main app + SPA deep-link fallback (/?view=labs, refreshes on client routes)
location / {
    try_files $uri $uri/ /index.html;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Cache-Control "no-cache" always;
}

# ── hashed, immutable build assets (incl. self-hosted fonts). `^~` so a regex static block can't shadow it.
location ^~ /assets/ {
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

# ── client toolchain (the in-browser compiler, tens of MB) — long cache, manifest revalidated (block below)
location ^~ /toolchain/ {
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Cache-Control "public, max-age=604800" always;
}
location = /toolchain/manifest.json {
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Cache-Control "no-cache" always;
}

# ── ESP32 classic (Xtensa) client toolchain — the selectable WiFi board fetches this (~100MB). Needs the
#    same isolation headers + long cache as /toolchain/; WITHOUT this block it falls through to `location /`
#    (try_files) which would mask a missing file with index.html and serve it no-cache (re-download every load).
#    (If you re-enable the ESP32-C3 board, add a matching `^~ /c3-toolchain/` block.)
location ^~ /esp32-classic-toolchain/ {
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Cache-Control "public, max-age=604800" always;
}
location = /esp32-classic-toolchain/esp32-classic-sdk.json {
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Cache-Control "no-cache" always;
}

# NOTE on .mjs MIME: NOT required. Every toolchain .mjs is fetched as bytes and re-wrapped in a
# Blob({type:'text/javascript'}) before import(), so aaPanel serving .mjs as application/octet-stream
# does not break module loading. (If you still want it tidy: add `text/javascript mjs;` to the
# `types { }` block in /www/server/nginx/conf/mime.types and reload nginx.)
